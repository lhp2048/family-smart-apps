# CI 构建产物：Android APK、iOS（无签名 IPA）、Web；不包含桌面端。
name: Flutter CI

on:
  # 仅手动：仓库 Actions → Flutter CI → Run workflow（不再在 push/PR 时自动跑）
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS 必须在 macOS 上构建；--no-codesign 仅用于 CI 未签名包（上架需证书与 Xcode / fastlane）
  build-ios:
    runs-on: macos-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA (release, no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Upload iOS build artifacts (IPA / archive)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: |
            build/ios/ipa/
            build/ios/archive/
          if-no-files-found: warn

  build-web:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: flutter build web --release

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/
