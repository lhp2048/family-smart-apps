name: family_smart_center
description: "FamilyAI — Flutter 客户端"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path: ^1.9.0
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  screenshot: ^3.0.0
  share_plus: ^12.0.2
  gal: ^2.3.2
  shared_preferences: ^2.5.3
  shared_preferences_web: ^2.4.3
  mobile_scanner: ^7.0.0
  url_launcher: ^6.3.1
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  flutter_markdown: ^0.7.7+1
  pdfx: ^2.9.2
  epub_plus: ^5.1.0
  flutter_widget_from_html: ^0.17.2

dependency_overrides:
  pdfx:
    path: packages/pdfx

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  # 主资源：1024×1024 PNG，建议全幅不透明渐变（避免透明区被 iOS 填成白底）
  image_path: assets/app_icon/app_icon_source.png
  min_sdk_android: 21
  # 与 AppTheme.shellBackground 一致，避免与主页深色底脱节
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: assets/app_icon/app_icon_source.png
  # 默认 16% 缩进会在前景周围留出「环」；略减小使图标更满幅
  adaptive_icon_foreground_inset: 8
  # flutter_launcher_icons 默认把透明像素与 #fff 混合，会整片发白，须与主色一致
  background_color_ios: "#1A1A2E"

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/app_icon/app_icon_splash_foreground.png
  android_12:
    color: "#1A1A2E"
    image: assets/app_icon/app_icon_splash_foreground.png
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon/
