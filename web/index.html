  <script id="sw-cache-cleanup">
    (function () {
      var APP_BUILD_STAMP = '26.705.1411';
      var PERSIST_KEY = 'family_app_sw_purge_stamp';
      var BOOTSTRAP_ID = 'flutter-bootstrap-loader';

      function loadFlutter() {
        function attach() {
          if (document.getElementById(BOOTSTRAP_ID)) {
            return;
          }
          var el = document.createElement('script');
          el.id = BOOTSTRAP_ID;
          el.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(APP_BUILD_STAMP);
          el.async = true;
          document.body.appendChild(el);
        }
        if (document.body) {
          attach();
        } else {
          document.addEventListener('DOMContentLoaded', attach);
        }
      }

      function purgeServiceWorkerCache() {
        var tasks = [];

        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) {
                return r.unregister();
              }));
            })
          );
        }

        if ('caches' in window) {
          tasks.push(
            caches.keys().then(function (names) {
              return Promise.all(names.map(function (name) {
                return caches.delete(name);
              }));
            })
          );
        }

        return Promise.all(tasks);
      }

      try {
        if (localStorage.getItem(PERSIST_KEY) === APP_BUILD_STAMP) {
          loadFlutter();
          return;
        }
      } catch (_) {
        loadFlutter();
        return;
      }

      purgeServiceWorkerCache()
        .then(function () {
          try {
            localStorage.setItem(PERSIST_KEY, APP_BUILD_STAMP);
          } catch (_) {}
          loadFlutter();
        })
        .catch(function () {
          loadFlutter();
        });
    })();
  </script>
